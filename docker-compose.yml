version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - micro-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: always # Keeps retrying until MySQL is ready
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
    networks:
      - micro-network

  product-service:
    build: ./product-service
    container_name: product-service
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/product_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    ports:
      - "8081:8081"
    depends_on:
      - mysql-db
    networks:
      - micro-network

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/inventory_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    ports:
      - "8082:8082"
    depends_on:
      - mysql-db
    networks:
      - micro-network

  order-service:
    build: ./order-service
    container_name: order-service
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - INVENTORY_SERVICE_URL=http://inventory-service:8082
    ports:
      - "8083:8083"
    depends_on:
      - mysql-db
      - inventory-service
    networks:
      - micro-network

networks:
  micro-network:
    driver: bridge
